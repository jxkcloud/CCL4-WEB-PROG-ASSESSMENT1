<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Petrol Calculator</title>

        <!-- external css -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- calculator area -->
  <section class="petrol-box">
    <h1>Petrol Calculator</h1>

    <!-- how much the petrol price is -->
    <label for="cost">Cost per litre (£):</label>
    <input type="number" id="cost" value="1.72" step="0.01">

    <!-- how many litres it is -->
    <label for="litres">Litres purchased:</label>
    <input type="number" id="litres" value="0" step="0.1">

    <!-- button to calculate -->
    <button onclick="calculateTotal()">Calculate</button>

    <!-- it's result output -->
    <p id="result">Total cost: £0.00</p>
  </section>


  <!--everything between "<script>" is javascript-->
  <script>
    // simple calculation
    function calculateTotal() {
      const price = parseFloat(document.getElementById("cost").value);
      const litres = parseFloat(document.getElementById("litres").value);

      const answer = (price * litres).toFixed(2);

      document.getElementById("result").textContent = "Total cost: £" + answer;
    }
  </script>

</body>
</html>
