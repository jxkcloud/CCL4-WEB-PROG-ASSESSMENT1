<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- page should scale normally on different screens -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Embedded Video Practice</title>

  <link rel="stylesheet" href="styles.css">

  <!-- small icon -->
  <link rel="shortcut icon" href="https://fav.farm/🎥" type="image/x-icon">
</head>
<body>

  <!-- main container for centering everything -->
  <div class="page-wrapper">

    <section class="video-box">
      <h1>Sample Video</h1>

      <!-- local video file -->
      <video controls loop autoplay muted poster="./vid&poster/poster.jpg">
        <source src="./vid&poster/sample-15s.webm" type="video/webm">
      </video>

      <p>
        a 15 second video loop of a park :D (you can choose to unmute)
      </p>
    </section>

  </div>
  <footer>
    <p>CHAPTER 5 EMBEDDED CONTENT</p>
  </footer>

</body>
</html>
